syntax = "proto3";

package pb;

option go_package = "internal/infra/grpc/proto/pb";

import "google/api/annotations.proto";

service HelloWorld {
  rpc Hello (Blank) returns (HelloResponse) {
    option (google.api.http) = {
      get: "/v1/hello"
    };
  }

}

message Blank {}

message HelloResponse {
  string message = 1;
}