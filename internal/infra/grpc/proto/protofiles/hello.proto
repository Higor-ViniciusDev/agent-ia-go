syntax = "proto3";

package pb;

option go_package = "internal/infra/grpc/proto/pb";

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";


service Work {
  rpc Hello (WorkRequest) returns (WorkResponse) {
    option (google.api.http) = {
      post: "/work"
      body: "*"
    };
  }
}

message WorkRequest {
  google.protobuf.Struct data = 1;
}

message WorkResponse {
  string response = 1;
}