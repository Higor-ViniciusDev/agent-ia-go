services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sem_nome
    ports:
      - "5432:5432"

  app:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    ports:
      - "3000:8000"
      - "50051:50051"
    env_file:
    - ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 40s
      timeout: 3s
      retries: 2
      start_period: 50s